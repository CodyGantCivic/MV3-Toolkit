<html>

<head>
  <title>CivicPlus Internal Toolkit - Changelog</title>
  <link rel="stylesheet" type="text/css" href="../css/external/bootstrap.min.css" />
  <link rel="stylesheet" type="text/css" href="../css/changelog.css" />
  <link rel="stylesheet" type="text/css" href="../css/global.css" />
  <link rel="stylesheet" type="text/css" href="../css/external/fontawesome-all.min.css" />
  <style>
    .tool-list {
      margin: 10px 0 10px 20px;
    }
    .tool-list li {

      font-weight: 600;
      color: #af282f;

      margin-bottom: 8px;

  </style>

        <div class="tool-category">On-Load Tools (run automatically)</div>
        <ul class="tool-list" id="on-load-tools-list"></ul>
        
        <div class="tool-category">On-Demand Tools (context menu)</div>
        <ul class="tool-list" id="on-demand-tools-list"></ul>

  </div>
  <script src="../js/changelog.js"></script>
